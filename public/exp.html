<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Chat</title>
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f0f2f5;
        }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #ccc; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            width: 100%; 
            max-width: 430px; 
            min-height: 100vh; 
            background: white; 
            padding: 25px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.2); 
            box-sizing: border-box;
            position: relative;
        }
        .hidden { display: none !important; }
        
        /* 홈 링크 스타일 */
        .home-link {
            cursor: pointer;
            font-weight: bold;
            color: #888;
            font-size: 14px;
            padding: 5px 10px;
            border-radius: 8px;
            transition: background 0.2s;
            display: inline-block;
            margin-bottom: 10px;
        }
        .home-link:hover { background: #f0f0f0; color: var(--primary-color); }

        input, textarea, select { 
            width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px;
        }
        button { 
            width: 100%; padding: 16px; background: var(--primary-color); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: opacity 0.2s;
        }
        button:active { opacity: 0.7; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .tag { background: #eef2ff; color: #444; padding: 6px 14px; border-radius: 20px; font-size: 14px; border: 1px solid #dbeafe; }
        .card { background: #f8faff; padding: 20px; border-radius: 16px; margin-top: 15px; border: 1px solid #eef2ff; }
        
        .input-group { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
        .input-group input { flex: 1; margin: 0; }
        .add-btn { width: auto !important; padding: 12px 18px !important; margin: 0 !important; background: #6c757d; font-size: 14px; }

        .thumb-placeholder {
            min-width: 100px; height: 75px; background: #e9ecef; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #adb5bd; font-size: 12px; flex-shrink: 0; border: 1px solid #dee2e6;
        }

        .survey-option.selected {
            border: 2px solid var(--primary-color) !important;
            background-color: #eef2ff !important;
            color: var(--primary-color) !important;
            font-weight: bold;
        }

        .bot-msg, .user-msg {
            max-width: 85%;
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-all;
        }
        
        .bot-msg {
            background: #eef2ff;
            color: #333;
            border-radius: 18px 18px 18px 0;
            align-self: flex-start;
        }
        
        .user-msg {
            background: var(--primary-color);
            color: white;
            border-radius: 18px 18px 0 18px;
            align-self: flex-end;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="home-link" onclick="goHome()">🏠 Chat</div>

       <div id="intro-section" class="container">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="color: var(--primary-color); font-size: 22px;">연구 참여 시스템</h1>
                <p style="color: #666; font-size: 13px;">지정된 방 번호와 공유할 비밀번호를 입력하세요.</p>
            </div>
        
            <div class="input-group" style="display: flex; flex-direction: column; gap: 15px;">
                <div>
                    <label style="display: block; font-size: 12px; color: #888; margin-bottom: 5px;">참여자 ID</label>
                    <input type="text" id="participantId" placeholder="예: User_A" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
        
                <div>
                    <label style="display: block; font-size: 12px; color: #888; margin-bottom: 5px;">방 번호 (Room Number)</label>
                    <input type="text" id="roomNumber" placeholder="예: 101" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
        
                <div>
                    <label style="display: block; font-size: 12px; color: #888; margin-bottom: 5px;">방 비밀번호 (Partner와 공유)</label>
                    <input type="password" id="roomPassword" placeholder="본인들이 정한 4자리 숫자" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
        
                <button onclick="handleLogin()" style="width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                    실험 입장하기
                </button>
            </div>
        </div>
        
        <div id="onboarding-section" class="hidden">
            <h2>거의 다 됐어요!</h2>
            <label>ID 설정</label>
            <input type="text" id="participantId" placeholder="사용하실 ID를 입력하세요">

            <label>불안 요소 (추가 버튼을 눌러주세요)</label>
            <div class="input-group">
                <input type="text" id="anxietyInput" placeholder="예: 직장, 건강, 미래">
                <button type="button" class="add-btn" onclick="addAnxietyTag()">추가</button>
            </div>
            <div id="anxietyTagsContainer" class="tag-container"></div>

            <label>현재 불안 수치: <span id="levelDisplay">5</span></label>
            <input type="range" id="initialAnxiety" min="1" max="10" value="5">

            <label>사용 목적</label>
            <select id="purpose">
                <option value="care">감정 정리</option>
                <option value="positive">미래를 긍정적으로 상상하기</option>
                <option value="pattern">불안 패턴 파악</option>
            </select>

            <button onclick="submitOnboarding()">시작하기</button>
        </div>

        <div id="dashboard-section" class="hidden">
            <h2 id="welcomeMsg">안녕하세요!</h2>
            <div class="card">
                <p>📊 평균 불안 수치: <span id="avgAnxiety" style="font-weight:bold; color:red;">-</span></p>
                <p>🏷 주요 키워드: <span id="topKeyword" style="font-weight:bold; color:blue;">-</span></p>
            </div>
            <div style="margin-top: 20px;">
                <p style="font-weight: bold;">🎥 최근 영상</p>
                <div id="recentVideos" style="display: flex; gap: 10px; overflow-x: auto;">
                    <div class="thumb-placeholder">기록 없음</div>
                </div>
            </div>
            <div style="margin-top: 25px;">
                <button onclick="toggleTracking()" style="background:#28a745;">📊 나의 변화 확인하기 (트래킹)</button>
                <button onclick="startConversation()" style="background:#ff7b00; margin-top:12px;">💬 오늘의 대화 시작하기</button>
            </div>
            <div id="tracking-section" class="hidden" style="margin-top:20px;">
                <canvas id="anxietyChart"></canvas>
            </div>
        </div>

        <div id="chat-section" class="hidden">
            <div style="display: flex; align-items: center; margin-bottom: 20px; gap: 10px;">
                <button onclick="showSection('dashboard-section')" style="width: auto; padding: 8px 12px; background: #f0f0f0; color: #333; margin: 0;">←</button>
                <h2 style="margin: 0;">마음 나누기 (실험중)</h2>
            </div>
        
            <div id="chat-window" style="height: 500px; overflow-y: auto; border: 1px solid #eee; border-radius: 16px; padding: 15px; background: #fafafa; margin-bottom: 15px; display: flex; flex-direction: column; gap: 15px;">
                </div>
        
            <div class="input-group">
                <input type="text" id="chatInput" placeholder="메시지를 입력하세요..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="add-btn" style="background: var(--primary-color);">전송</button>
            </div>
        </div>

    </div>

    <script>
        // --- 전역 변수 ---
        let myChart = null;

        async function handleLogin() {
            const pId = document.getElementById('participantId').value.trim();
            const rNum = document.getElementById('roomNumber').value.trim();
            const rPw = document.getElementById('roomPassword').value.trim();
        
            if (!pId || !rNum || !rPw) {
                alert("모든 정보를 입력해주세요.");
                return;
            }
        
            const roomId = `room_${rNum}`;
        
            try {
                const response = await fetch('/api/room/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roomId: roomId, password: rPw })
                });
        
                const result = await response.json();
        
                if (response.ok) {
                    // 로그인 정보 로컬 저장
                    window.currentParticipantId = pId;
                    window.currentRoomId = roomId;
                    
                    alert(result.status === "created" ? "방을 새로 만들었습니다!" : "방에 입장합니다.");
                    
                    // 다음 단계(온보딩)로 이동
                    showSection('onboarding-section'); 
                } else {
                    alert(result.message); // "비밀번호가 틀립니다" 등 출력
                }
            } catch (err) {
                alert("서버 연결에 실패했습니다.");
            }
        }
        
        // 대화 세션 시작 함수
        function startChatSession() {
            const pId = document.getElementById('participantId').value;
            
            if (!pId) {
                alert("참여 아이디를 확인해주세요.");
                showSection('login-section');
                return;
            }
        
            // 1. 화면 전환
            showSection('chat-section');
        
            // 2. ⭐ 상태 저장: 'chat_log' 단계로 기록
            // 새로고침해도 이 단계로 바로 들어오게 하는 표식입니다.
            localStorage.setItem('currentStep', 'chat_log');
        
            // 3. 실시간 대화 업데이트 시작
            if (window.chatInterval) clearInterval(window.chatInterval);
            
            fetchMessages(); // 즉시 한번 가져오기
            window.chatInterval = setInterval(fetchMessages, 3000); // 3초마다 반복
            
            console.log(`[실험 기록] ${pId} 님이 'chat_log' 단계에 진입했습니다.`);
        }

        // 섹션 전환 함수
        function showSection(sectionId) {
            const sections = ['intro-section', 'onboarding-section', 'dashboard-section', 'chat-section'];
            sections.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.add('hidden');
            });
            
            const target = document.getElementById(sectionId);
            if (target) target.classList.remove('hidden');
        }
        
        function goHome() {
            if (confirm("처음 화면으로 돌아가시겠습니까?")) {
                showSection('intro-section');
            }
        }

        async function submitOnboarding() {
        
            try {
                const response = await fetch('/api/user/onboarding', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                if (response.status === 404) {
                    console.error("404 에러 발생: 서버 주소를 다시 확인하세요.");
                }
                // ...
            } catch (err) {
                console.error(err);
            }
        }
        
        // 1. 대화 시작 함수
        function startConversation() {
            console.log("대화 시작!"); // 디버깅용
            showSection('chat-section');
            
            // 채팅창 진입 시 초기 메시지 세팅 (선택 사항)
            const chatWindow = document.getElementById('chat-window');
            if (chatWindow.children.length <= 1) { // 메시지가 초기 메시지 하나뿐이라면
                // 추가 로직 필요 시 여기에 작성
            }
        }
        
        // 2. 메시지 전송 함수
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            const myId = document.getElementById('participantId').value;
        
            if (!text) return;
        
            // 서버(FastAPI)의 저장 경로로 데이터를 보냄
            const response = await fetch('/api/chat/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    roomId: "room101", // 실험용 방 ID
                    senderId: myId,
                    text: text
                })
            });
        
            if (response.ok) {
                input.value = ""; // 성공 시 입력창 비우기
            } else {
                alert("서버 저장에 실패했습니다.");
            }
        }
        
        function appendMessage(sender, text) {
            const chatWindow = document.getElementById('chat-window');
            const msgDiv = document.createElement('div');
            
            if (sender === 'user') {
                msgDiv.style = "background: var(--primary-color); color: white; padding: 10px 15px; border-radius: 15px 15px 0 15px; align-self: flex-end; max-width: 85%; font-size: 14px;";
            } else {
                msgDiv.style = "background: #eef2ff; color: #333; padding: 10px 15px; border-radius: 15px 15px 15px 0; align-self: flex-start; max-width: 85%; font-size: 14px;";
            }
            
            msgDiv.innerText = text;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight; // 스크롤 하단 고정
        }
        
        // 3. Veo/Sora 영상 생성 함수
        async function generateVideo() {
            const pId = document.getElementById('participantId').value;
            alert("영상을 생성합니다...");
        
            // 실제로는 여기서 AI API(Luma 등)를 호출하고 URL을 받아옴
            const fakeVideoUrl = "https://example.com/generated-video.mp4"; 
        
            // 생성된 URL을 MongoDB에 저장하기 위해 백엔드 호출
            await fetch('/api/user/update-video', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    participantId: pId,
                    videoUrl: fakeVideoUrl
                })
            });
        
            alert("영상 저장 완료!");
            showSection('dashboard-section');
        }

        let currentRoomId = "1004"; // 실험용 방 번호
        let lastMessageCount = 0;
        let chatInterval = null;
        
        // 대화창 열기
        function startConversation() {
            showSection('chat-section');
            
            // 이미 실행 중인 인터벌이 있다면 제거
            if (chatInterval) clearInterval(chatInterval);
            
            // 3초마다 새 메시지 확인
            chatInterval = setInterval(fetchMessages, 3000); 
            fetchMessages(); // 진입 시 즉시 한 번 호출
        }

        // 서버에서 메시지 가져와서 화면에 그리기
        async function fetchMessages() {
            const response = await fetch(`/api/chat/receive/${currentRoomId}`);
            if (response.ok) {
                const messages = await response.json();
                const chatWindow = document.getElementById('chat-window');
                
                // 이전 내용 지우기 (전체 갱신형)
                chatWindow.innerHTML = ""; 
                
                messages.forEach(msg => {
                    renderMessageToContainer(msg); // 위에서 만든 함수 호출
                });
                
                // 스크롤 하단 고정
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        // 화면에 말풍선과 [영상 생성] 버튼 그리기
        function appendMessageToUI(msg, isMyMsg) {
            const chatWindow = document.getElementById('chat-window');
            const msgDiv = document.createElement('div');
            
            // 말풍선 스타일 (본인/상대방 구분)
            msgDiv.className = isMyMsg ? "user-msg" : "bot-msg"; // 기존 CSS 활용
            msgDiv.style.position = "relative";
            msgDiv.style.marginBottom = "15px";
        
            msgDiv.innerHTML = `
                <div style="font-size: 11px; color: ${isMyMsg ? '#eee' : '#888'}; margin-bottom: 4px;">
                    ${msg.senderId}
                </div>
                <div>${msg.text}</div>
                <button onclick="requestVideoGen('${msg._id}', '${msg.text}')" 
                        style="width:auto; padding:2px 6px; font-size:10px; background:#ff7b00; margin-top:5px; border-radius:4px;">
                    🎬 AI 영상 생성
                </button>
            `;
            
            chatWindow.appendChild(msgDiv);
        }

        function renderMessageToContainer(msg) {
            const chatWindow = document.getElementById('chat-window');
            const myId = document.getElementById('participantId').value;
            const isMyMsg = (msg.senderId === myId);
        
            // 1. 전체를 감싸는 한 줄(Row) 컨테이너 생성
            const messageRow = document.createElement('div');
            messageRow.style.display = "flex";
            messageRow.style.flexDirection = "column";
            messageRow.style.alignItems = isMyMsg ? "flex-end" : "flex-start";
            messageRow.style.width = "100%";
        
            // 2. 이름 태그 (누가 보냈는지 표시)
            const senderName = document.createElement('span');
            senderName.innerText = msg.senderId;
            senderName.style.fontSize = "11px";
            senderName.style.color = "#888";
            senderName.style.marginBottom = "3px";
            senderName.style.padding = "0 5px";
            messageRow.appendChild(senderName);
        
            // 3. 실제 말풍선 div
            const bubble = document.createElement('div');
            bubble.style.maxWidth = "80%";
            bubble.style.padding = "12px 15px";
            bubble.style.fontSize = "14px";
            bubble.style.lineHeight = "1.4";
            bubble.style.position = "relative";
            bubble.style.boxShadow = "0 1px 2px rgba(0,0,0,0.1)";
        
            if (isMyMsg) {
                bubble.style.background = "#007bff"; // 본인 메시지 파란색
                bubble.style.color = "white";
                bubble.style.borderRadius = "15px 15px 0 15px";
            } else {
                bubble.style.background = "#ffffff"; // 상대방 메시지 흰색
                bubble.style.color = "#333";
                bubble.style.border = "1px solid #eee";
                bubble.style.borderRadius = "15px 15px 15px 0";
            }
        
            // 4. 말풍선 내부에 텍스트와 [영상 생성] 버튼 추가
            bubble.innerHTML = `
                <div style="word-break: break-all;">${msg.text}</div>
                <div style="margin-top: 8px; padding-top: 6px; border-top: 1px solid ${isMyMsg ? 'rgba(255,255,255,0.3)' : '#eee'}; text-align: right;">
                    <button onclick="requestVideoGen('${msg._id}', '${msg.text.replace(/'/g, "\\'")}')" 
                            style="width:auto; padding:3px 8px; font-size:10px; background:#ff7b00; color:white; border:none; border-radius:4px; cursor:pointer;">
                        🎬 영상 생성 지시
                    </button>
                </div>
            `;
        
            messageRow.appendChild(bubble);
        
            // 5. 최종적으로 컨테이너(chat-window)에 추가
            chatWindow.appendChild(messageRow);
        }

        // 영상 생성 요청 (실험 데이터 기록용)
        async function requestVideoGen(msgId, text) {
            const myId = document.getElementById('participantId').value;
        
            // 영상 생성 요청 정보를 서버로 보냄
            const response = await fetch('/api/user/update-video', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    participantId: myId,
                    sourceMsgId: msgId,   // 어떤 메시지로부터 만들었는지
                    promptText: text,      // 영상의 재료가 된 텍스트
                    videoUrl: "pending"    // 아직 생성 중임을 표시
                })
            });
        
            if (response.ok) {
                alert("영상 생성 요청이 DB에 기록되었습니다.");
            }
        }
        
    </script>
</body>
</html>
